<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Panel Cafetería{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  {% if current_user.is_authenticated %}
  <nav class="nav">
    <span class="nav__brand">Cafetería · Admin</span>
    <div class="nav__links">
      <a href="{{ url_for('usuarios.listar') }}">Usuarios</a>
      <span class="nav__user">{{ current_user.nombre }}</span>
      <a href="{{ url_for('auth.logout') }}">Salir</a>
    </div>
  </nav>
  {% endif %}
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash flash--{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
